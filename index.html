<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PP Coin - Watch Ads & Earn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f0f0f0; }
        img { border-radius: 50%; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <div id="user-info">
        <!-- User profile will load here -->
    </div>
    <button onclick="showAd()">Watch Ad for Rewards</button>

    <script>
        // Telegram WebApp Initialization
        Telegram.WebApp.ready();
        const user = Telegram.WebApp.initDataUnsafe.user;

        if (user) {
            const userInfo = document.getElementById('user-info');
            if (user.photo_url) {
                const img = document.createElement('img');
                img.src = user.photo_url;
                img.alt = 'Profile Picture';
                img.width = 100;
                userInfo.appendChild(img);
            }
            const name = document.createElement('p');
            name.textContent = `Hello, ${user.first_name} ${user.last_name || ''}!`;
            userInfo.appendChild(name);
        } else {
            console.log('No Telegram user data available. This app is meant for Telegram Mini Apps.');
        }

        // OnClicka Ad SDK Initialization
        window.initCdTma?.({ id: 417811 }).then(show => {
            window.showAd = show;
            console.log('Ad SDK initialized successfully.');
        }).catch(e => console.error('Ad SDK initialization error:', e));

        // Ad show function with callbacks
        function showAd() {
            if (window.showAd) {
                window.showAd()
                    .then(() => {
                        console.log('Ad watched successfully! Add your reward logic here.');
                        alert('Ad completed! You earned rewards.');  // Example reward notification
                    })
                    .catch(e => {
                        console.error('Ad show error:', e);
                        alert('Error showing ad. Try again.');
                    });
            } else {
                alert('Ad SDK not ready. Please wait or refresh.');
            }
        }
    </script>
</body>
</html>
