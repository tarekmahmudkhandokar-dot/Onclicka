<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PP Coin App</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
      color: white;
      min-height: 100vh;
    }

    #loading-screen, #join-modal {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: rgba(18, 18, 18, 0.98);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.4s ease;
    }

    .loader {
      border: 6px solid #2a2a2a;
      border-top: 6px solid #00aaff;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .modal-content {
      text-align: center;
      padding: 32px 24px;
      max-width: 90%;
      background: rgba(30, 30, 50, 0.6);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 170, 255, 0.15);
      backdrop-filter: blur(10px);
    }

    h2, h3 {
      margin-bottom: 16px;
      font-size: 1.8rem;
      color: #00d4ff;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    p {
      margin-bottom: 24px;
      font-size: 1.1rem;
      opacity: 0.9;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      margin: 12px 8px;
      transition: all 0.3s ease;
      border: none;
    }

    .btn-join {
      background: linear-gradient(45deg, #00aaff, #0077cc);
      color: white;
    }

    .btn-join:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 170, 255, 0.4);
    }

    .btn-verify {
      background: linear-gradient(45deg, #2ecc71, #27ae60);
      color: white;
    }

    .btn-verify:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(46, 204, 113, 0.4);
    }

    #main-app {
      padding: 50px 20px;
      text-align: center;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #main-app h1 {
      font-size: 2.5rem;
      margin-bottom: 16px;
      color: #00d4ff;
    }

    #main-app p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader"></div>
    <p>Verifying your access...</p>
  </div>

  <!-- Join Modal (আকর্ষণীয় ব্যানার স্টাইল) -->
  <div id="join-modal" style="display: none;">
    <div class="modal-content">
      <h2>PP Coin</h2>
      <h3>Unlock Full Access Now!</h3>
      <p>Join our exclusive channel to discover all features, rewards, and updates in PP Coin App.</p>
      <a href="https://t.me/PPCoinChannel" target="_blank" class="btn btn-join">Join Channel</a>
      <button class="btn btn-verify" onclick="checkUserStatus()">I Have Joined – Verify</button>
    </div>
  </div>

  <!-- Main App Content -->
  <div id="main-app" style="display: none;">
    <h1>Welcome to PP Coin App 🎉</h1>
    <p>আপনি সফলভাবে ভেরিফাইড হয়েছেন! এখন সম্পূর্ণ অ্যাপ উপভোগ করুন।</p>
    <!-- এখানে আপনার মূল অ্যাপের কন্টেন্ট যোগ করুন (ব্যালেন্স, বাটন, গেম ইত্যাদি) -->
  </div>

  <!-- Firebase Compat (যদি 1st gen functions ব্যবহার করেন) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>

  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
    // =============================================
    //          Firebase Config – আপনার প্রজেক্টের তথ্য দিন
    // =============================================
    const firebaseConfig = {
      apiKey: "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
      authDomain: "your-project-id.firebaseapp.com",
      projectId: "your-project-id",
      storageBucket: "your-project-id.appspot.com",
      messagingSenderId: "123456789012",
      appId: "1:123456789012:web:xxxxxxxxxxxxxxxxxxxxxx"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const functions = firebase.functions();

    // Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.expand();  // ফুল স্ক্রিন
    tg.ready();

    const CHANNEL_LINK = "https://t.me/PPCoinChannel";

    async function checkUserStatus() {
      const loading = document.getElementById('loading-screen');
      const joinModal = document.getElementById('join-modal');
      const mainApp = document.getElementById('main-app');

      loading.style.display = 'flex';
      joinModal.style.display = 'none';

      const user = tg.initDataUnsafe?.user;
      const userId = user?.id;

      if (!userId) {
        alert("অ্যাপটি Telegram থেকে ওপেন করুন।");
        loading.style.display = 'none';
        return;
      }

      try {
        // Cloud Function কল (আপনার Firebase-এ checkMembership নামে ফাংশন থাকতে হবে)
        const checkMembership = functions.httpsCallable('checkMembership');
        const result = await checkMembership({ userId: String(userId) });

        if (result.data?.joined === true) {
          loading.style.display = 'none';
          mainApp.style.display = 'block';
          tg.MainButton.setText("Continue").show(); // অপশনাল: Telegram Main Button
        } else {
          loading.style.display = 'none';
          joinModal.style.display = 'flex';
        }
      } catch (error) {
        console.error("Error:", error);
        alert("ভেরিফিকেশন সমস্যা হয়েছে। আবার চেষ্টা করুন।");
        loading.style.display = 'none';
        joinModal.style.display = 'flex';
      }
    }

    // অটো polling (প্রতি ৫ সেকেন্ডে চেক – join modal ওপেন থাকলে)
    let pollingInterval;
    function startPolling() {
      pollingInterval = setInterval(() => {
        if (document.getElementById('join-modal').style.display === 'flex') {
          checkUserStatus();
        }
      }, 5000);
    }

    // পেজ লোড হলেই শুরু
    window.addEventListener('load', () => {
      checkUserStatus();
      startPolling();  // অটো ভেরিফাই চালু
    });

    // অপশনাল: Telegram-এর Back বাটন হ্যান্ডেল (যদি দরকার হয়)
    tg.BackButton.onClick(() => tg.close());
  </script>

</body>
</html>
