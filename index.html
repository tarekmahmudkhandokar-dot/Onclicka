<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta 
  name="viewport" 
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>
<title>PP Coin - Claim</title>

<!-- Telegram WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- OnClickA TMA SDK -->
<script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0f172a;
    color: #fff;
    font-family: Arial, sans-serif;
    overflow: hidden; /* screen shake fix */
}
#app {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
}
button {
    padding: 16px 40px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    color: #000;
    font-weight: bold;
}
button:disabled {
    background: #64748b;
}
</style>
</head>

<body>

<div id="app">
    <h2>PP Coin</h2>
    <button id="claimBtn" disabled>Loading Ad...</button>
</div>

<script>
/* Telegram Init */
Telegram.WebApp.ready();
// ❌ expand বাদ
// Telegram.WebApp.expand();

const btn = document.getElementById("claimBtn");
let showAdFn = null;

/* Init OnClickA */
window.initCdTma({
    id: 417811
})
.then(show => {
    showAdFn = show;
    btn.disabled = false;
    btn.innerText = "Claim & Watch Ad";
    console.log("OnClickA Ready");
})
.catch(err => {
    console.log("Init failed", err);
    btn.innerText = "Ad Not Available";
});

/* Button Click */
btn.onclick = () => {
    if (!showAdFn) {
        alert("Ad not ready");
        return;
    }

    showAdFn()
    .then(() => {
        alert("✅ Ad Completed");
        // reward logic here
    })
    .catch(e => {
        console.log("Ad failed", e);
        alert("❌ No Ad / Blocked");
    });
};
</script>

</body>
</html>
