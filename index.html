<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PP Coin - Watch Ads & Earn</title>

<!-- Telegram WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- OnClicka TMA SDK -->
<script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #fff;
        text-align: center;
        padding: 20px;
    }
    img {
        border-radius: 50%;
        margin-bottom: 10px;
    }
    button {
        padding: 12px 25px;
        font-size: 16px;
        background: #22c55e;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }
    button:disabled {
        background: #64748b;
        cursor: not-allowed;
    }
</style>
</head>

<body>

<div id="user-info"></div>

<button id="adBtn" disabled>Loading Ad...</button>

<script>
/* ===============================
   Telegram WebApp Init
================================ */
Telegram.WebApp.ready();
const user = Telegram.WebApp.initDataUnsafe?.user;

if (user) {
    const box = document.getElementById('user-info');

    if (user.photo_url) {
        const img = document.createElement('img');
        img.src = user.photo_url;
        img.width = 90;
        box.appendChild(img);
    }

    const p = document.createElement('p');
    p.innerText = `Hello, ${user.first_name}!`;
    box.appendChild(p);
}

/* ===============================
   OnClicka TMA Init
================================ */
const adBtn = document.getElementById('adBtn');

window.initCdTma({
    id: 417811   // ✅ YOUR AD SPOT ID
}).then(show => {
    window.showAd = show;
    adBtn.disabled = false;
    adBtn.innerText = "Watch Ad & Earn";
    console.log("TMA Ad Ready");
}).catch(err => {
    console.error("TMA Init Error:", err);
    adBtn.innerText = "Ad Not Available";
});

/* ===============================
   Show Ad
================================ */
adBtn.onclick = () => {
    if (!window.showAd) return;

    window.showAd()
        .then(() => {
            console.log("Ad watched successfully");
            alert("✅ Ad Completed! Reward added.");
            // 👉 এখানে তুমি reward API call করবে
        })
        .catch(err => {
            console.error("Ad Error:", err);
            alert("❌ Ad failed. Try again later.");
        });
};
</script>

</body>
</html>
